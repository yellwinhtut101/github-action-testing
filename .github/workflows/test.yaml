name: Synthetic Test
on:
  push:
    branches:
      - "**"
      - "!main"
jobs:
  test:
    name: Run Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v2.1.5
        with:
          node-version: "16"
      - name: Test
        run: yarn ci:install && yarn ci:test
